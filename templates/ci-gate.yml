# CI parity gate — deployed by install.sh to .github/workflows/gate.yml
# Runs the committed gate.sh in CI mode so a hook-stripped clone (a developer
# who deleted .githooks or pushed with --no-verify) still cannot merge unverified
# code. CI is the authoritative backstop to the local pre-commit/pre-push hooks.
name: governance-gate

on:
  pull_request:
    branches: [main, master, develop, "release/**", production]
  push:
    branches: [main, master, develop, "release/**", production]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — gate needs diff range)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python (gate.sh json helpers)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify governance files are present, unmodified, and integrity-pinned
        run: |
          set -euo pipefail
          test -f .githooks/gate.sh   || { echo "::error::.githooks/gate.sh missing — governance stripped"; exit 1; }
          test -f .claude/gate_state.json || { echo "::error::.claude/gate_state.json missing"; exit 1; }
          test -f .claude/gate_integrity.sha256 || { echo "::error::.claude/gate_integrity.sha256 missing — integrity pin stripped"; exit 1; }

          # Content-hash check, not just presence: a PR can otherwise weaken
          # gate.sh and still pass CI as long as the file exists. This is the
          # actual security boundary — .claude/gate_integrity.sha256 must be
          # blocked from casual agent edits (see the trust-root deny-list in
          # .claude/settings.json) and ideally covered by CODEOWNERS + branch
          # protection so only a human-reviewed PR can move the pinned hash.
          ACTUAL_HASH=$(sha256sum .githooks/gate.sh | awk '{print $1}')
          EXPECTED_HASH=$(awk '{print $1}' .claude/gate_integrity.sha256)
          if [ "$ACTUAL_HASH" != "$EXPECTED_HASH" ]; then
              echo "::error::Deployed gate.sh content does not match the pinned integrity hash." >&2
              echo "::error::expected=${EXPECTED_HASH} actual=${ACTUAL_HASH}" >&2
              echo "::error::If this change is legitimate, re-run install.sh --upgrade to regenerate the pin, then commit both files together under human review." >&2
              exit 1
          fi
          echo "Governance files present and integrity-verified."

      - name: Run governance gate (mechanical — tests forced on in CI)
        env:
          GATE_TRIGGER: ci
          RUN_TESTS: "true"
        run: |
          set -euo pipefail
          chmod +x .githooks/gate.sh
          # CI runs the gate against the checked-out tree. Tests, coverage,
          # lint ratchet, complexity, and secrets scan all execute mechanically.
          bash .githooks/gate.sh
